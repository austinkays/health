name: Visual regression

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Only install Chromium — the other browsers aren't needed for layout tests
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run visual tests
        run: npx playwright test
        env:
          # These are already in your Vercel project — copy them to
          # GitHub repo Settings → Secrets and variables → Actions
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # On failure, upload the HTML report so you can download it and open
      # playwright-report/index.html to see the visual diff side-by-side.
      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
