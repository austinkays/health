name: Refresh static resources reminder
on:
  schedule:
    - cron: '0 10 1 */3 *' # 10am UTC on the 1st of every 3rd month (Jan, Apr, Jul, Oct)
  workflow_dispatch: # manual trigger

jobs:
  remind:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '📋 Quarterly: refresh Discover static resources',
              body: [
                '## Time to update curated resources',
                '',
                'The static Discover resources in `src/constants/resources/` should be reviewed quarterly.',
                '',
                '### Checklist',
                '- [ ] **EveryCure** (`everycure.js`): Check [everycure.org/portfolio](https://everycure.org/portfolio/) for new programs',
                '- [ ] **Understood.org** (`understood.js`): Browse [understood.org](https://understood.org) for new relevant articles',
                '- [ ] Review existing entries for broken links or outdated info',
                '- [ ] Consider adding new resource sources (NORD, NAMI, condition-specific foundations)',
                '',
                '_Auto-generated by the refresh-resources workflow._',
              ].join('\n'),
              labels: ['maintenance'],
            });
